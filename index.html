<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SultonAli</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
 
:root{
  --bg:#000;
  --s1:#111113;
  --s2:#1c1c1e;
  --s3:#2c2c2e;
  --b1:rgba(255,255,255,0.08);
  --b2:rgba(255,255,255,0.14);
  --t1:#fff;
  --t2:rgba(255,255,255,0.55);
  --t3:rgba(255,255,255,0.28);
  --blue:#0a84ff;
  --green:#30d158;
  --pink:#ff375f;
  --yt:#ff3b30;
  --tg:#0a84ff;
}
 
html,body{
  background:var(--bg);
  color:var(--t1);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
}
 
body{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:
    max(env(safe-area-inset-top,0px),48px)
    max(env(safe-area-inset-right,0px),20px)
    max(env(safe-area-inset-bottom,0px),40px)
    max(env(safe-area-inset-left,0px),20px);
}
 
/* background orbs */
.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur) ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:var(--lo);transform:scale(1)}to{opacity:var(--hi);transform:scale(1.4)}}
.shoot{position:absolute;width:120px;height:1.5px;background:linear-gradient(90deg,rgba(255,255,255,0.9),transparent);border-radius:2px;animation:shoot var(--sd) linear infinite;opacity:0}
@keyframes shoot{0%{opacity:0;transform:translateX(0) translateY(0) rotate(-35deg)}10%{opacity:1}80%{opacity:0.3}100%{opacity:0;transform:translateX(-400px) translateY(200px) rotate(-35deg)}}
.nebula{position:absolute;border-radius:50%;filter:blur(80px);animation:neb 14s ease-in-out infinite alternate}
.n1{width:420px;height:420px;background:rgba(88,28,220,0.18);top:-80px;right:-80px}
.n2{width:360px;height:360px;background:rgba(10,60,160,0.14);bottom:-60px;left:-60px;animation-delay:-7s}
.n3{width:200px;height:200px;background:rgba(200,30,120,0.1);top:40%;left:20%;animation-delay:-3s}
@keyframes neb{to{transform:translate(30px,40px) scale(1.1)}}
 
/* page */
.page{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  display:flex;flex-direction:column;align-items:center;
}
 
/* avatar */
.av-wrap{
  position:relative;width:88px;height:88px;
  margin-bottom:16px;
  animation:popIn .65s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.av-ring{
  position:absolute;inset:-2.5px;border-radius:50%;
  background:conic-gradient(#0a84ff,#5e5ce6,#ff375f,#ff9f0a,#0a84ff);
  animation:spin 5s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.av-inner{
  position:relative;z-index:1;
  width:88px;height:88px;border-radius:50%;
  background:var(--s2);border:3px solid var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:1.7rem;font-weight:700;color:#fff;letter-spacing:-1px;
}
 
.name{font-size:1.25rem;font-weight:700;letter-spacing:-.4px;margin-bottom:3px;animation:fu .5s .15s ease both;opacity:0}
.handle{font-size:.78rem;color:var(--blue);margin-bottom:8px;animation:fu .5s .2s ease both;opacity:0}
.bio{font-size:.76rem;color:var(--t2);text-align:center;line-height:1.55;max-width:240px;animation:fu .5s .25s ease both;opacity:0}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
 
/* pills */
.pills{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;justify-content:center;animation:fu .5s .3s ease both;opacity:0}
.pill{
  display:flex;align-items:center;gap:5px;
  background:var(--s2);border:.5px solid var(--b2);
  border-radius:100px;padding:5px 11px;
  font-size:.68rem;font-weight:500;color:var(--t2);
  white-space:nowrap;
}
.dot{width:6px;height:6px;border-radius:50%}
.dg{background:var(--green);box-shadow:0 0 6px var(--green)}
.db{background:var(--blue)}
.dr{background:var(--yt)}
 
/* divider */
.div{width:100%;height:.5px;background:var(--b1);margin:20px 0 16px;animation:fu .5s .32s ease both;opacity:0}
 
/* section label */
.lbl{
  width:100%;font-size:.66rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;color:var(--t3);
  padding:0 4px 8px;
  animation:fu .5s .34s ease both;opacity:0;
}
 
/* links */
.links{width:100%;display:flex;flex-direction:column;gap:9px}
 
.lnk{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:.5px solid rgba(255,255,255,0.12);border-radius:16px;
  text-decoration:none;color:var(--t1);
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),border-color .2s,background .12s;
}
.lnk::after{
  content:'';position:absolute;inset:0;opacity:0;
  transition:opacity .2s;pointer-events:none;
}
.lnk.yt::after{background:radial-gradient(ellipse at 0% 50%,rgba(255,59,48,.13),transparent 65%)}
.lnk.ig::after{background:radial-gradient(ellipse at 0% 50%,rgba(238,42,123,.1),transparent 65%)}
.lnk.tg::after{background:radial-gradient(ellipse at 0% 50%,rgba(10,132,255,.1),transparent 65%)}
.lnk:hover{transform:scale(1.018);border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.1)}
.lnk:hover::after{opacity:1}
.lnk:active,.lnk.tap{transform:scale(.975);background:rgba(255,255,255,0.04)}
 
.lnk:nth-child(1){animation:si .5s .36s cubic-bezier(.16,1,.3,1) both}
.lnk:nth-child(2){animation:si .5s .44s cubic-bezier(.16,1,.3,1) both}
.lnk:nth-child(3){animation:si .5s .52s cubic-bezier(.16,1,.3,1) both}
@keyframes si{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
 
.ico{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ico svg{width:19px;height:19px;fill:#fff}
.ico-yt{background:var(--yt)}
.ico-ig{background:linear-gradient(135deg,#f9ce34,#ee2a7b,#6228d7)}
.ico-tg{background:var(--tg)}
 
.lnk-body{flex:1;min-width:0}
.lnk-name{font-size:.93rem;font-weight:600;display:block}
.lnk-sub{font-size:.71rem;color:var(--t2);display:block;margin-top:1px}
 
.chev{width:7px;height:12px;flex-shrink:0;stroke:var(--t3);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;fill:none;transition:transform .15s,stroke .15s}
.lnk:hover .chev{transform:translateX(2px);stroke:var(--t2)}
 
/* footer */
.foot{margin-top:28px;font-size:.68rem;color:var(--t3);letter-spacing:.3px;text-align:center;animation:fu .5s .6s ease both;opacity:0}
</style>
</head>

    s.style.cssText='width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--dur:'+dur+'s;--lo:'+lo+';--hi:'+hi+';animation-delay:'+(Math.random()*6).toFixed(1)+'s';
    c.appendChild(s);
  }
  for(var j=0;j<5;j++){
    var sh=document.createElement('div');
    sh.className='shoot';
    sh.style.cssText='left:'+(30+Math.random()*50)+'%;top:'+(5+Math.random()*30)+'%;--sd:'+(4+j*3)+'s;animation-delay:'+(j*2.5)+'s';
    c.appendChild(sh);
  }
})();
</script>
</body>
</html>
